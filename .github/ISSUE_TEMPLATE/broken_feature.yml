name: "Broken Feature"
description: Feature exists but behaves incorrectly
title: "[BROKEN] <Class> - <Spell> - <Short description>"
labels: ["bug", "gameplay"]
body:
  - type: input
    id: class_name
    attributes:
      label: Class Name
    validations:
      required: true

  - type: input
    id: spell_name
    attributes:
      label: Spell Name
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen (reference retail if possible)
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happens
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Cosmetic
        - Minor gameplay issue
        - Major gameplay issue
        - Game-breaking
